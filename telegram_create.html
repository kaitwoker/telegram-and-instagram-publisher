<!DOCTYPE html>
<html>
<head>
    <title>Отправка в Telegram</title>
</head>
<body>

<h1>Отправить в Telegram</h1>

{% if messages %}
<ul>
    {% for message in messages %}
        <li>{{ message }}</li>
    {% endfor %}
</ul>
{% endif %}

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Текст сообщения (опционально):</label><br>
    <textarea
        name="text"
        rows="6"
        cols="60"
        placeholder="Введите текст сообщения"
    ></textarea>

    <br><br>

    <label>Фото (опционально):</label><br>
    <input type="file" name="photo" accept="image/*">

    <br><br>

    <button type="submit">
        Отправить
    </button>
</form>

<br>
<a href="{% url 'home' %}">← Назад</a>

</body>
</html>
