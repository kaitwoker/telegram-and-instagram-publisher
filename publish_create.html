<!DOCTYPE html>
<html>
<head>
    <title>Публикация</title>
</head>
<body>

<h1>Опубликовать в Telegram и Instagram</h1>

{% if messages %}
<ul>
    {% for message in messages %}
        <li>{{ message }}</li>
    {% endfor %}
</ul>
{% endif %}

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Текст поста:</label><br>
    <textarea name="caption" rows="6" cols="60"
              placeholder="Введите текст (опционально)"></textarea>

    <br><br>

    <label>Фото:</label><br>
    <input type="file" name="image" accept="image/*">

    <br><br>

    <button type="submit">
        Опубликовать в Telegram и Instagram
    </button>
</form>

<br>
<a href="{% url 'home' %}">← Назад</a>

</body>
</html>
