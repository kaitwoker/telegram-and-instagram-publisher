<!-- backend/posts/templates/posts/instagram_create.html -->

<!DOCTYPE html>
<html>
<head>
    <title>Создание поста для Instagram</title>
</head>
<body>

<h1>Создать пост для Instagram</h1>

{% if messages %}
<ul>
    {% for message in messages %}
        <li>{{ message }}</li>
    {% endfor %}
</ul>
{% endif %}

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <label for="caption">Подпись к посту:</label><br>
    <textarea
        id="caption"
        name="caption"
        rows="6"
        cols="60"
        placeholder="Введите текст поста"
        required
    ></textarea>

    <br><br>

    <label for="image">Изображение (опционально):</label><br>
    <input type="file" id="image" name="image" accept="image/*">

    <br><br>

    <button type="submit">Опубликовать</button>
</form>

<br>
<a href="{% url 'home' %}">← Назад</a>

</body>
</html>
